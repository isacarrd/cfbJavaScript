<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 4.1</title>
</head>
<body>
  <h1>O Botão Autodestrutivo</h1>
  <button id="btnSumir">Me apague</button>
  <script>
    const btnSumir = document.getElementById('btnSumir')
    btnSumir.addEventListener('click', (evt) => {
      btnSumir.remove(btnSumir)
    })
  </script>
</body>
</html>
