<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 2.2</title>
</head>
<body>
  <h1>Evento de Teclado e Captura de Valor</h1>
  <input type="text" id="campo-busca">
  <script>
    const campo = document.getElementById("campo-busca")
    campo.addEventListener("keyup", (evt) => {
      return console.log(evt.target.value)
    })
  </script>
</body>
</html>
