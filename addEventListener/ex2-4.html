<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 2.4</title>
</head>
<body>
  <h1>Prevenção de Comportamento Padrão (preventDefault)</h1>
  <form id="meu-form">
    <label for="">Enfeite</label>
    <input type="text" name="" id="" placeholder="Só para enfeite">
    <button type="submit">Enviar</button></form>
    <script>
      const formu = document.getElementById("meu-form")
      formu.addEventListener("submit", (evt) => {
        evt.preventDefault()
        console.log("Envio bloqueado para a validação.")
      })
    </script>
</body>
</html>
