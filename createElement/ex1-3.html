<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1.3</title>
</head>
<body>
  <h1>Inserindo uma Imagem</h1>
  <div id="galeria"></div>
  <script>
    const galeria = document.getElementById('galeria')
    const imagem = document.createElement('img')
    imagem.setAttribute('src', 'https://i.pinimg.com/736x/84/e2/d4/84e2d4bcfcb9cdb5d94c3ad11c630295.jpg')
    galeria.appendChild(imagem)
  </script>
</body>
</html>
