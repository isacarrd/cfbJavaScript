<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1.4</title>
  <style>
    .btnPrimario{
      color: red;
    }
  </style>
</head>
<body>
  <h1>Botão com Classe CSS</h1>
  <script>
    const botao = document.createElement('button')
    botao.innerText = "Clique Aqui"
    botao.classList.add('btnPrimario')
    document.body.appendChild(botao)
  </script>
</body>
</html>
