<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1.4</title>
</head>
<body>
  <h1>Acordeão (FAQ Simples)</h1>

  <h3 id="pergunta">O que é JS?</h3>
  <p id="resposta">É uma linguagem de programação.</p>
  <script>
    const pergunta = document.getElementById('pergunta')
    pergunta.addEventListener('click', (evt)=>{
      evt.preventDefault()
      const resposta = document.getElementById('resposta')
      resposta.classList.toggle('aberto')
    })
  </script>
</body>
</html>
