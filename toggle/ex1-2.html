<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1.2</title>
</head>

<body>
  <h1>Menu Hambúrguer (Expandir/Recolher)</h1>
  <button id="btnMenu">Menu</button> 
  <nav id="navegacao" class="escondido">
    <ul>
      <li>Home</li>
    </ul>
  </nav>
  <script>
    const btnMenu = document.getElementById('btnMenu')
    btnMenu.addEventListener('click', (evt)=>{
      evt.preventDefault()
      const navegacao = document.getElementById('navegacao')
      navegacao.classList.toggle('escondido')
    })
  </script>
</body>

</html>
