<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 1.3</title>
  <style>
    .curtido{
      color: red;
      background-color: white;
    }
  </style>
</head>
<body>
  <h1>Botão de Curtir (Like)</h1>
  <button id="btnLike">Coração</button>
  <script>
    const btnLike = document.getElementById('btnLike')
    btnLike.addEventListener('click', (evt)=>{
      evt.preventDefault()
      btnLike.classList.toggle('curtido')
      console.log('Status de classe alterado!')
    })
  </script>
</body>
</html>
