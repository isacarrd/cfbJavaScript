<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 4.3</title>
  <style>
    .erro-input{
      border: 1px solid red;
    }
  </style>
</head>
<body>
  <h1>Irmão Seguinte (nextElementSibling)</h1>
    <label id="label-email">
      Email:
    </label>
    <input type="email">
    <script>
      const label = document.getElementById('label-email')
      // console.log(label.nextElementSibling)
      const input = label.nextElementSibling
      console.log(input)
      input.classList.add('erro-input')
    </script>
</body>
</html>
