<!DOCTYPE html>

  <title>Exercício 4.2</title>
</head>
<body>
  <h1>Descendo para os Filhos (children / firstElementChild)</h1>
  <ul id="lista-frutas">
    <li>Maçã</li>
    <li>Banana</li>
    <li>Uva</li>
  </ul>

    lista.firstElementChild.style.color = 'red'
  </script>
