<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 4.5</title>
</head>

<body>
  <h1>Busca com Escopo Fechado (elemento.querySelector)</h1>
  <article class="post-1">
    <p class="resumo">A</p>
  </article>
  <article class="post-2">
    <p class="resumo">B</p>
  </article>
  <script>
    const segArtigo = document.querySelector('.post-2')
    const resumo = segArtigo.querySelector('.resumo')
    console.log(resumo)
    resumo.textContent = "Resumo atualizado"
  </script>
</body>

</html>
