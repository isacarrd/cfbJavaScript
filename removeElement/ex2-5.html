<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 2.5</title>
</head>

<body>
  <h1>Esvaziamento Completo (Loop)</h1>
  <div id="carrinho">
    <p>Item A</p>
    <p>Item B</p>
    <p>Item C</p>
  </div>
  <script>
    const carrinho = document.getElementById('carrinho')

    while(carrinho.firstElementChild){
      carrinho.removeChild(carrinho.firstElementChild)
      console.log('removendo')
    }
  </script>
</body>

</html>
